name: CI/CD SanteConnect Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  # ==========================================
  # Étape 1 : Vérification syntaxe (Lint / Build) et Tests unitaires/intégration
  # ==========================================
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    # Service MongoDB conteneurisé pour exécuter les tests dans le pipeline
    services:
      mongodb:
        image: mongo:6.0-jammy
        ports:
          - 27017:27017

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Vérifier la syntaxe et le typage TypeScript (Build compilation)
        run: npm run build

      - name: Exécuter les tests automatisés avec rapport de couverture
        run: npm test

      - name: Archiver le rapport de couverture de tests
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 1

  # ==========================================
  # Étape 2 : Analyse statique de code et Porte de Qualité (SonarQube)
  # ==========================================
  sonar-analysis:
    name: Code Quality (SonarQube)
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Requis pour une analyse git complète par SonarQube

      - name: Télécharger le rapport de couverture archivé
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: Exécuter l'analyse de code SonarCloud
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Attente du résultat de la Porte de Qualité (Quality Gate)
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # ==========================================
  # Étape 3 : Construction et publication de l'image sur Docker Hub
  # ==========================================
  build-and-push:
    name: Build & Push Docker Hub
    runs-on: ubuntu-latest
    needs: sonar-analysis

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Configurer Docker Buildx (pour des builds optimisés)
        uses: docker/setup-buildx-action@v3

      - name: Connexion sécurisée à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construire l'image (Build locale)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          # Double marquage : tag latest et tag unique basé sur le hash du commit
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/santeconnect:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/santeconnect:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Analyse de vulnérabilités avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/santeconnect:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Publier l'image sur Docker Hub (Push)
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/santeconnect:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/santeconnect:${{ github.sha }}
